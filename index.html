<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق التداول الفوري - واجهة رئيسية</title>
    <!-- خط جوجل Inter (يدعم العربية) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (الأيقونات) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0B0E11;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .content {
            max-width: 1200px;
            width: 100%;
        }

        /* تنسيق اسم الموقع الجديد */
        .site-title {
            text-align: center;
            margin-bottom: 20px;
        }
        .site-title h2 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #F0B90B 0%, #F8D12F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #F0B90B 0%, #F8D12F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        .header p {
            font-size: 1.1rem;
            color: #b7bdc6;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
            font-weight: 400;
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 30px 20px;
            justify-items: center;
            align-items: start;
            margin-top: 30px;
        }

        .icon-card {
            background-color: #1E2329;
            border-radius: 24px;
            padding: 25px 15px;
            width: 100%;
            max-width: 180px;
            text-align: center;
            transition: transform 0.25s ease, background-color 0.25s, box-shadow 0.25s;
            border: 1px solid #2b3139;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: block;
        }

        .icon-card:hover {
            background-color: #2b3139;
            transform: translateY(-6px);
            box-shadow: 0 10px 25px -5px rgba(240, 185, 11, 0.2);
            border-color: #F0B90B;
        }

        .icon-card i {
            font-size: 3.5rem;
            color: #F0B90B;
            margin-bottom: 15px;
            display: block;
        }

        .icon-card span {
            font-size: 1rem;
            font-weight: 500;
            color: #eaecef;
            display: block;
            line-height: 1.4;
        }

        @media (max-width: 600px) {
            .site-title h2 {
                font-size: 2rem;
            }
            .header h1 {
                font-size: 2rem;
            }
            .header p {
                font-size: 1rem;
            }
            .icons-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .icon-card {
                max-width: none;
                padding: 20px 10px;
            }
            .icon-card i {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <!-- اسم الموقع Blo Trade 24 -->
        <div class="site-title">
            <h2>Blo Trade 24</h2>
        </div>

        <!-- العنوان الرئيسي -->
        <div class="header">
            <h1>التداول الفوري العملات الرقمية المشفرة</h1>
            <p>نقدم لكم توصيات لتداول الفوري للعملات المشفرة احترافية بشكل يومي، والتوصيات مدروسة من قبل الخبراء في التداول.</p>
        </div>

        <!-- شبكة الأيقونات - كل بطاقة تفتح صفحة داخلية منفصلة -->
        <div class="icons-grid">
            <!-- التوصيات -->
            <a href="recommendations.html" class="icon-card">
                <i class="fas fa-chart-line"></i>
                <span>التوصيات</span>
            </a>
            <!-- كلمة اليوم -->
            <a href="word-of-day.html" class="icon-card">
                <i class="fas fa-calendar-day"></i>
                <span>كلمة اليوم</span>
            </a>
            <!-- فقاعة العملات -->
            <a href="crypto-bubble.html" class="icon-card">
                <i class="fas fa-coins"></i>
                <span>فقاعة العملات</span>
            </a>
            <!-- تعليم التداول -->
            <a href="learn-trading.html" class="icon-card">
                <i class="fas fa-graduation-cap"></i>
                <span>تعليم التداول</span>
            </a>
            <!-- كورس التداول -->
            <a href="trading-course.html" class="icon-card">
                <i class="fas fa-play-circle"></i>
                <span>كورس التداول</span>
            </a>
            <!-- سوق العملات -->
            <a href="currency-market.html" class="icon-card">
                <i class="fas fa-globe"></i>
                <span>سوق العملات</span>
            </a>
            <!-- اختيار الفائز -->
            <a href="winner-pick.html" class="icon-card">
                <i class="fas fa-trophy"></i>
                <span>اختيار الفائز</span>
            </a>
        </div>
    </div>
</body>
</html>
